<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Social Media Selector</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  
  <!-- Selected -->
  <div class="selector" id="selector">
    <span id="selectedText">Select Social Media</span>
    <span class="arrow" id="arrow">▼</span>
  </div>

  <!-- Options -->
  <ul class="options" id="options">
    <li data-name="Facebook">📘 Facebook</li>
    <li data-name="YouTube">▶️ YouTube</li>
    <li data-name="Instagram">📸 Instagram</li>
    <li data-name="Twitter">🐦 Twitter</li>
  </ul>

</div>

<script src="script.js"></script>
</body>
</html>
