<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Step Progress Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Progress Bar -->
    <div class="progress-bar">
      <div class="progress" id="progress"></div>

      <div class="circle active">✔<small>Start</small></div>
      <div class="circle">✔<small>Step 1</small></div>
      <div class="circle">✔<small>Step 2</small></div>
      <div class="circle">✔<small>Step 3</small></div>
      <div class="circle">✔<small>Final</small></div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button id="prev">←</button>
      <button id="next">→</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
