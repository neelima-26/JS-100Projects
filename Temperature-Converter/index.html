<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1 class="h1">Temperature-Converter</h1>
        <div class="card">
            <div class="row">
                <label class="label">Celsius:</label>
                <input type="number" id="celsius" placeholder="Enter value">
            </div>
            <br>
            <br>
            <br>
            <label class="label">Fahrenheit:</label>
            <input type="number" id="fahrenheit" placeholder="Enter value">
            <br><br><br>
            <label class="label">Kelvin:</label>
            <input type="number" id="kelvin" placeholder="Enter value">
        </div>
    </div>
    <script>
        let temp = document.getElementById("celsius");

            fahrenheit.value = (value * 9 / 5) + 32;
            kelvin.value = (value + 273);
        }

        fahrenheit.oninput = function () {

            let value = parseFloat(fahrenheit.value);
            let celsius = (value - 32) * 5 / 9;
            celsius.value = celsius;
            kelvin.value = celsius + 273;
        }
        kelvin.oninput = function () {
            let value = parseFloat(kelvin.value);
            let celsius = (value - 273);
            celsius.value = celsius;
            fahrenheit.value = (celsius * 9 / 5) + 32;
        }
    </script>
</body>

</html>
