<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse-Event</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <div class="container">

  <div class="item">
    <p>Position X</p>
    <div class="box">
      <span id="x">0</span>
    </div>
  </div>

  <div class="item">
    <p>Position Y</p>
    <div class="box">
      <span id="y">0</span>
    </div>
  </div>

</div>
  <script>
    
    document.addEventListener("mousemove", function(event) {

      
      let x = event.clientX;
      let y = event.clientY;

      
      document.getElementById("x").innerText = x;
      document.getElementById("y").innerText = y;

    });
  </script>
</body>
</html>
